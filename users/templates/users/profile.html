{% extends 'posts/base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<!-- component -->
<div class="min-h-[110vh] min-w-full bg-indigo-50 dark:bg-gray-800 pt-6">
            <div class="container lg:w-2/3 xl:w-2/7 sm:w-full md:w-2/3    bg-white  shadow-lg    transform   duration-200 easy-in-out">
                <div class=" h-32 overflow-hidden" >
                    <img class="w-full" src="https://images.unsplash.com/photo-1605379399642-870262d3d051?ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&ixlib=rb-1.2.1&auto=format&fit=crop&w=2000&q=80" alt="" />
                </div>
                <div class="flex justify-center px-5  -mt-12">
                    <img class="h-44 w-44 bg-white p-2 rounded-full   " src="{{ user.profile.image.url }}" alt="" />

                </div>
                <form action="" method="POST" class="p-2" enctype="multipart/form-data">
                {% csrf_token %}
                    <div class=" ">
                        <div class="text-center px-14">
                            <h2 class="text-gray-800 text-3xl font-bold">{{ user.username }}</h2>
                            <a class="text-gray-400 mt-2 hover:text-blue-500" href="" target="BLANK()">{{ user.email }}</a>
                            <p class="text-left mt-2 text-gray-500 text-sm"><label for="username" class="leading-7 text-sm text-gray-600">Username</label></p>
                            <p class="mt-2 text-gray-500 text-sm"><input type="text" id="username" name="username" value="{{ user.username }}" class="w-full bg-gray-100 bg-opacity-50 rounded border border-gray-300 focus:border-indigo-500 focus:bg-transparent focus:ring-2 focus:ring-indigo-200 text-base outline-none text-gray-700 py-1 px-3 leading-8 transition-colors duration-200 ease-in-out"></p>
                            <p class="text-left mt-2 text-gray-500 text-sm"><label for="email" class="leading-7 text-sm text-gray-600">Email</label></p>
                            <p class="mt-2 text-gray-500 text-sm"><input type="email" id="email" name="email" value="{{ user.email }}" class="w-full bg-gray-100 bg-opacity-50 rounded border border-gray-300 focus:border-indigo-500 focus:bg-transparent focus:ring-2 focus:ring-indigo-200 text-base outline-none text-gray-700 py-1 px-3 leading-8 transition-colors duration-200 ease-in-out"></p>
                        </div>
                        <div class="pl-16">
                            {{ p_form|crispy }}
                            </div>
                        <div class="flex justify-center">
                            <button type="submit" class="items-center mt-4 ml-24 text-white bg-indigo-500 border-0 py-2 px-8 focus:outline-none hover:bg-indigo-600 rounded text-lg">Update</button>
                        </div>
                        <hr class="mt-6" />
                        <div class="flex  bg-gray-50 ">
                            <div class="text-center w-1/2 p-4 hover:bg-gray-100 cursor-pointer">
                                <p><span class="font-semibold">2.5 k </span> Followers</p>
                            </div>
                            <div class="border"></div>
                            <div class="text-center w-1/2 p-4 hover:bg-gray-100 cursor-pointer">
                                <p> <span class="font-semibold">2.0 k </span> Following</p>
                            </div>

                        </div>
                    </div>
                    </form>

            </div>
        </div>

{% endblock %}
